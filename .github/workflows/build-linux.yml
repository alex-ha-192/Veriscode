name: Build Linux installers

# Builds the .deb via VSCodium's own Linux build pipeline, then wraps it in
# a Flatpak (building Icarus Verilog from source for the sandbox - see
# installers/flatpak/com.veriscode.veriscode.yaml for why). Manual/tag
# triggered like build-windows.yml: this is a long, bandwidth-heavy build,
# and the Flatpak leg in particular hasn't been exercised end-to-end in
# this repo's dev sandbox (no flatpak-builder or outbound github.com
# access there) - expect to iterate on it here in CI.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-deb:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      deb-artifact: veriscode-deb
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build Veriscode for Linux
        run: scripts/build.sh linux x64

      - name: Locate the built .deb
        id: find
        run: |
          deb=$(find .build/vscodium -iname "*.deb" | head -n1)
          if [[ -z "$deb" ]]; then
            echo "No .deb found under .build/vscodium - check the build log above." >&2
            exit 1
          fi
          echo "Found $deb"
          cp "$deb" veriscode_amd64.deb
          echo "deb_path=veriscode_amd64.deb" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: veriscode-deb
          path: ${{ steps.find.outputs.deb_path }}

  build-flatpak:
    needs: build-deb
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: veriscode-deb
          path: installers/flatpak/

      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub org.freedesktop.Sdk//24.08 org.freedesktop.Platform//24.08
          sudo flatpak install -y --noninteractive flathub org.electronjs.Electron2.BaseApp//24.08 || true

      - name: Point the manifest at this run's local .deb
        run: |
          pip install --quiet pyyaml
          cd installers/flatpak
          python3 point-to-local-deb.py

      - name: Build the Flatpak
        working-directory: installers/flatpak
        run: |
          flatpak-builder --force-clean --user --install-deps-from=flathub \
            build-dir com.veriscode.veriscode.yaml

      - name: Bundle into a single .flatpak file
        working-directory: installers/flatpak
        run: |
          flatpak-builder --repo=repo --force-clean build-dir com.veriscode.veriscode.yaml
          flatpak build-bundle repo veriscode.flatpak com.veriscode.veriscode

      - uses: actions/upload-artifact@v4
        with:
          name: veriscode-flatpak
          path: installers/flatpak/veriscode.flatpak

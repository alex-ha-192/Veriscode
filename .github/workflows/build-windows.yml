name: Build Windows installer

# Full build: clones VS Code source, bakes in our extensions + bundled
# Verible/Icarus Verilog, and packages an Inno Setup .exe. This takes a
# long time and a lot of bandwidth, so it's manual/tag-triggered rather
# than running on every push - see scripts/build.sh for what it does and
# why it hasn't been run end-to-end in this repo's dev sandbox (no
# outbound access to github.com/chipsalliance or Chocolatey there).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ensure jq is available
        run: |
          if (-not (Get-Command jq -ErrorAction SilentlyContinue)) {
            choco install jq -y --no-progress
          }
        shell: pwsh

      - name: Build Veriscode for Windows
        shell: bash
        run: scripts/build.sh windows x64

      - name: Locate the built installer
        id: find
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Path .build/vscodium -Recurse -Filter "*Setup*.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $setup) {
            throw "No Setup*.exe found under .build/vscodium - check the build log above."
          }
          Write-Host "Found installer: $($setup.FullName)"
          echo "installer_path=$($setup.FullName)" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: veriscode-windows-installer
          path: ${{ steps.find.outputs.installer_path }}
